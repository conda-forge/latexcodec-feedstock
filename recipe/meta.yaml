{% set name = "latexcodec" %}
{% set version = "3.0.1" %}
{% set sha256 = "f59eeba7fef0bd4b58bdecffa10a738c7a479a68590bd7d2bd97bdc2dcaa776e" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  fn: {{ name }}-{{ version }}.tar.gz
  url: https://github.com/mcmtroffaes/{{ name }}/archive/{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  host:
    - pip
    - python
    - setuptools
    - six
  run:
    - python
    - six

test:
  imports:
    - latexcodec

about:
  home: https://github.com/mcmtroffaes/{{ name }}
  license: MIT
  license_family: MIT
  license_file: LICENSE.rst
  summary: Lexer and codec to work with LaTeX code in Python.
  doc_url: http://latexcodec.readthedocs.io/
  dev_url: https://github.com/mcmtroffaes/{{ name }}

extra:
  recipe-maintainers:
    - scopatz
